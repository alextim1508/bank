apiVersion: v2
name: elastic-kafka-chart
description: A Helm chart for Elasticsearch, Logstash, Kibana and Kafka
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: elasticsearch
    version: 8.5.1
    repository: "https://helm.elastic.co"
    alias: elasticsearch

  - name: logstash
    version: 8.5.1
    repository: "https://helm.elastic.co"
    alias: logstash

  - name: kibana
    version: 8.5.1
    repository: "https://helm.elastic.co"
    alias: kibana

  - name: kafka
    version: "32.4.3"
    repository: "https://charts.bitnami.com/bitnami"
    alias: kafka