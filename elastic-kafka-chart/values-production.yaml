# Production values for elastic-kafka-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

elasticsearch:
  enabled: true
  clusterName: "elasticsearch"
  replicas: 3
  roles:
    master: "true"
    ingest: "true"
    data: "true"
  image: "docker.elastic.co/elasticsearch/elasticsearch"
  imageTag: "8.5.1"
  imagePullPolicy: "IfNotPresent"
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 4Gi
  service:
    type: ClusterIP
    port: 9200
  # Probe configuration
  probes:
    livenessInitialDelaySeconds: 60
    readinessInitialDelaySeconds: 30
  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 30Gi
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
      xpack.security.http.ssl.enabled: false
      xpack.security.transport.ssl.enabled: false
      xpack.monitoring.collection.enabled: false
      cluster.routing.allocation.disk.threshold_enabled: false

kibana:
  enabled: true
  image: "docker.elastic.co/kibana/kibana"
  imageTag: "8.5.1"
  imagePullPolicy: "IfNotPresent"
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 5601
  # Probe configuration
  probes:
    livenessInitialDelaySeconds: 60
    readinessInitialDelaySeconds: 30
  kibanaConfig:
    kibana.yml: |
      server.host: "0.0.0.0"
      elasticsearch.hosts: ["http://{{ .Release.Name }}-elasticsearch:9200"]
      xpack.security.enabled: false

logstash:
  enabled: true
  image: "docker.elastic.co/logstash/logstash"
  imageTag: "8.5.1"
  imagePullPolicy: "IfNotPresent"
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 9600
  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      xpack.monitoring.enabled: false
  logstashPipeline:
    logstash.conf: |
      input {
        kafka {
          bootstrap_servers => "{{ .Release.Name }}-kafka:9092"
          topics => ["logs"]
          group_id => "logstash"
        }
      }
      
      filter {
        if [message] =~ /^\{.*\}$/ {
          json {
            source => "message"
          }
        }
      }
      
      output {
        elasticsearch {
          hosts => ["http://{{ .Release.Name }}-elasticsearch:9200"]
          index => "logstash-%{+YYYY.MM.dd}"
        }
        stdout {}
      }

kafka:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
    tag: "4.0.0-debian-12-r10"
  imagePullPolicy: "IfNotPresent"
  replicaCount: 3
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  config:
    num.partitions: 3
    default.replication.factor: 3
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
  # Kafka node configuration
  nodeId: 1
  controllerQuorumVoters: "1@localhost:9093"
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 10Gi