elasticsearch:
  enabled: true
  esJavaOpts: "-Xmx1g -Xms1g"
  clusterHealthCheckParams: ""
  elasticsearchSslVerificationMode: none

  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
      xpack.security.http.ssl.enabled: false
      xpack.security.transport.ssl.enabled: false
      xpack.security.transport.ssl.verification_mode: none
      xpack.security.autoconfiguration.enabled: false
      xpack.monitoring.collection.enabled: true
  # Disable certificate creation and mounting
  createCert: false
  secretMounts: []

  # Ресурсы
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

kafka:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
    tag: "4.0.0-debian-12-r10"
  replicaCount: 1
  topics:
    - name: account-logs
      partitions: 1
      replicas: 1
    - name: blocker-logs
      partitions: 1
      replicas: 1
    - name: cash-logs
      partitions: 1
      replicas: 1
    - name: transfer-logs
      partitions: 1
      replicas: 1
    - name: front-ui-logs
      partitions: 1
      replicas: 1
    - name: exchange-logs
      partitions: 1
      replicas: 1
    - name: exchange-generator-logs
      partitions: 1
      replicas: 1
    - name: notification-logs
      partitions: 1
      replicas: 1
    - name: rates-topic
      partitions: 1
      replicas: 1
  listeners:
    client:
      port: 9092
      protocol: PLAINTEXT
    controller:
      port: 9093
      protocol: SASL_PLAINTEXT

  interBrokerListenerName: client
  controllerListenerName: controller

  externalAccess:
    enabled: false

logstash:
  enabled: true
  imageTag: 8.18.0
  esJavaOpts: "-Xmx1g -Xms1g"
  extraEnvs:
    - name: LOGSTASH_SETTING_XPACK_MONITORING_ENABLED
      value: "false"
  logstashConfig:
    logstash.yml: |
      xpack.monitoring.enabled: false
      xpack.monitoring.elasticsearch.hosts: ["https://elasticsearch-master:9200"]      
      xpack.monitoring.elasticsearch.ssl.verification_mode: "none"
  logstashPipeline:
    monitoring.conf: |
      input {
        kafka {
          bootstrap_servers => "kafka:9092"
          topics => ["account-logs", "blocker-logs", "cash-logs", "transfer-logs", "front-ui-logs", "exchange-logs", "exchange-generator-logs", "notification-logs"]
          group_id => "logstash-group"
        }
      }
      filter {
        grok {
          match => [
            "message",
            "%{TIMESTAMP_ISO8601:time} \[%{DATA:thread}\] %{LOGLEVEL:log-level} %{DATA:logger} \[app:%{DATA:app}, trace:%{DATA:traceId}, span:%{DATA:spanId}\] - %{GREEDYDATA:msg}"
          ]
        }
      }
      output {
        elasticsearch {
          hosts => ["https://elasticsearch-master:9200"]
          index => "logs-%{+dd.MM.YYYY}"
          retry_on_conflict => 3
          action => "create"
          ssl_enabled => false
          ssl_verification_mode => "none"
          user => "elastic"
          password => "elactic"
        }
      }

kibana:
  enabled: true
  replicaCount: 1
  elasticsearchHosts: "https://elasticsearch-master:9200"
  elasticsearchUsername: "elastic"
  elasticsearchPassword: "elactic"
  healthCheckPath: "/api/status"

  # Отключаем pre-install job и SSL
  createKibanaToken: false

  # Отключаем TLS/SSL
  elasticsearchTLS: false
  tls: false

  # Явно отключаем сертификаты
  elasticsearchSslVerificationMode: none

  # Disable certificate mounting
  secretMounts: []
  extraVolumes: []
  extraVolumeMounts: []

  # Настройки для отключения SSL
  extraEnvs:
    - name: ELASTICSEARCH_HOSTS
      value: "https://elasticsearch-master:9200"
    - name: ELASTICSEARCH_USERNAME
      value: "elastic"
    - name: ELASTICSEARCH_PASSWORD
      value: "elactic"
    - name: ELASTICSEARCH_SSL_VERIFICATIONMODE
      value: "none"
    - name: ELASTICSEARCH_SSL_ENABLED
      value: "false"
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: "0"
    - name: XPACK_SECURITY_ENABLED
      value: "false"

  # Отключаем init containers и pre-install jobs
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000

  # Ресурсы
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  service:
    type: NodePort
    nodePort: 32000